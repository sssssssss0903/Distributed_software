version: "3.8"

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill_user
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 后端服务实例 1 (端口 8081)
  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: seckill-user-service
    container_name: seckill-backend-1
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # 后端服务实例 2 (端口 8082)
  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: seckill-user-service
    container_name: seckill-backend-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # 商品服务(含Redis缓存)
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: seckill-product-service
    container_name: seckill-product-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # Nginx 负载均衡与反向代理
  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend-1
      - backend-2
      - product-service
    networks:
      - seckill-net

volumes:
  mysql_data:
  redis_data:

networks:
  seckill-net:
    driver: bridge
