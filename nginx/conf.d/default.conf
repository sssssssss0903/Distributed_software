# 用户服务负载均衡 - 轮询 (round_robin)
# 可切换: least_conn; 或 ip_hash;
upstream backend_user {
    server backend-1:8081 weight=1;
    server backend-2:8082 weight=1;
}

# 商品服务(单实例，含Redis缓存)
upstream backend_product {
    server product-service:8083;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # 静态资源 - 动静分离
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 用户API - 负载均衡
    location /api/user/ {
        proxy_pass http://backend_user;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 商品API - 单实例(Redis缓存+ES搜索)
    location /api/product/ {
        proxy_pass http://backend_product;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 其他API兜底
    location /api/ {
        proxy_pass http://backend_user;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 根路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
    }
}
